# GNOME Keyring PKCS#11 software passkey provider.
#
# Prerequisites:
#   - dbus-passkey-gnome-keyring-provider running (CGO binary, requires gnome-keyring PKCS#11 module)
#   - dbus-passkey-ui-agent running (required — PIN is collected for every operation)
#
# First use: a "Set new PIN" dialog appears to initialize the PKCS#11 token PIN.
# Subsequent uses: a "Enter PIN" dialog appears before each credential operation.
#
# Private keys are generated and stored inside gnome-keyring's PKCS#11 module;
# they are never exposed in plaintext. Credential metadata (rp_id, user info,
# sign count) is stored encrypted in the GNOME Keyring Secret Service.

[Provider]
Name=GNOME Keyring
ID=gnome-keyring-provider
DBusName=fi.cmouse.PasskeyBroker.GnomeKeyringProvider
ObjectPath=/fi/cmouse/PasskeyBroker/GnomeKeyringProvider
Transports=internal
SupportedAlgorithms=-7
Priority=40
RequiresPIN=true
