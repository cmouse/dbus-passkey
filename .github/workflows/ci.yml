name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: CGO_ENABLED=0 go vet ./...

  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: vet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build e2e binaries
        env:
          CGO_ENABLED: "0"
        run: |
          go build -o dbus-passkey-nofido2       ./cmd/dbus-passkey
          go build -o dbus-passkey-test-provider ./cmd/test-provider
          go build -o dbus-passkey-e2e-test      ./cmd/e2e-test

      - name: Run e2e tests
        run: |
          export DBUS_SESSION_BUS_ADDRESS=$(dbus-daemon --session --fork --print-address)
          mkdir -p /tmp/test-providers
          cat > /tmp/test-providers/test-provider.conf << 'EOF'
          [Provider]
          Name=PasskeyTestProvider
          ID=test-provider
          DBusName=fi.cmouse.PasskeyBroker.TestProvider
          ObjectPath=/fi/cmouse/PasskeyBroker/TestProvider
          Transports=internal
          SupportedAlgorithms=-7
          Priority=50
          EOF
          ./dbus-passkey-test-provider &
          ./dbus-passkey-nofido2 -providers-dir /tmp/test-providers &
          ./dbus-passkey-e2e-test

  build-cgo:
    name: Build (CGO / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: vet
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libfido2
        run: sudo apt-get install -y libfido2-dev

      - name: Build CGO binaries
        run: |
          CGO_ENABLED=1 go build -o dbus-passkey                    ./cmd/dbus-passkey
          CGO_ENABLED=1 go build -o dbus-passkey-gnome-keyring-provider ./cmd/gnome-keyring-provider

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: dbus-passkey-linux-${{ matrix.arch }}
          path: |
            dbus-passkey
            dbus-passkey-gnome-keyring-provider
          retention-days: 1

  build-pure:
    name: Build (pure Go / ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: vet
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o dbus-passkey-nofido2       ./cmd/dbus-passkey
          go build -o dbus-passkey-ui-agent      ./cmd/ui-agent
          go build -o dbus-passkey-test-provider ./cmd/test-provider
          go build -o dbus-passkey-client        ./cmd/passkey-client

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: pure-linux-${{ matrix.goarch }}
          path: |
            dbus-passkey-nofido2
            dbus-passkey-ui-agent
            dbus-passkey-test-provider
            dbus-passkey-client
          retention-days: 1

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-cgo, build-pure]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package release assets
        run: |
          cd dist
          # amd64 CGO binary
          mkdir -p release
          cp dbus-passkey-linux-amd64/dbus-passkey                        release/dbus-passkey-linux-amd64
          cp dbus-passkey-linux-arm64/dbus-passkey                        release/dbus-passkey-linux-arm64
          cp dbus-passkey-linux-amd64/dbus-passkey-gnome-keyring-provider release/dbus-passkey-gnome-keyring-provider-linux-amd64
          cp dbus-passkey-linux-arm64/dbus-passkey-gnome-keyring-provider release/dbus-passkey-gnome-keyring-provider-linux-arm64
          # amd64 pure-Go binaries
          cp pure-linux-amd64/dbus-passkey-nofido2          release/dbus-passkey-nofido2-linux-amd64
          cp pure-linux-amd64/dbus-passkey-ui-agent         release/dbus-passkey-ui-agent-linux-amd64
          cp pure-linux-amd64/dbus-passkey-test-provider    release/dbus-passkey-test-provider-linux-amd64
          cp pure-linux-amd64/dbus-passkey-client           release/dbus-passkey-client-linux-amd64
          # arm64 pure-Go binaries
          cp pure-linux-arm64/dbus-passkey-nofido2          release/dbus-passkey-nofido2-linux-arm64
          cp pure-linux-arm64/dbus-passkey-ui-agent         release/dbus-passkey-ui-agent-linux-arm64
          cp pure-linux-arm64/dbus-passkey-test-provider    release/dbus-passkey-test-provider-linux-arm64
          cp pure-linux-arm64/dbus-passkey-client           release/dbus-passkey-client-linux-arm64
          # checksums
          cd release && sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*
